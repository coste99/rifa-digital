<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Administrador | Gran Rifa Digital</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='admin.css') }}">

</head>

<body>

<div class="overlay">

    <div class="login-card">

        <div class="logo">

            🔐

        </div>

        <h1>Panel Administrador</h1>

        <p>

            Inicia sesión para administrar tu rifa.

        </p>

        {% if error %}

        <div class="error">

            {{ error }}

        </div>

        {% endif %}

        <form method="POST">

            <input
                type="password"
                name="password"
                placeholder="Contraseña"
                required>

            <button type="submit">

                Ingresar

            </button>

        </form>

        <a href="/">

            ← Volver a la rifa

        </a>

    </div>

</div>

</body>

</html>
